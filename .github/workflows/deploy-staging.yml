name: Deploy Staging

on:
  push:
    branches: [staging]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            cd /opt/milletneder-staging
            git pull origin staging
            npm install --production=false

            # STAGING_BASIC_AUTH env var'ını güncelle
            STAGING_AUTH='${{ secrets.STAGING_BASIC_AUTH }}'
            if [ -n "$STAGING_AUTH" ]; then
              sed -i '/STAGING_BASIC_AUTH/d' .env.local 2>/dev/null || true
              echo "STAGING_BASIC_AUTH=$STAGING_AUTH" >> .env.local
              echo ">> STAGING_BASIC_AUTH updated in .env.local"
            else
              echo ">> WARNING: STAGING_BASIC_AUTH secret is empty!"
            fi

            # Middleware dosyası kontrolü
            if [ -f src/middleware.ts ]; then
              echo ">> src/middleware.ts found ($(wc -c < src/middleware.ts) bytes)"
            else
              echo ">> ERROR: src/middleware.ts NOT FOUND!"
            fi

            # Eski build cache temizle (middleware gibi yeni dosyaların derlenmesini garanti et)
            rm -rf .next

            npm run build

            # PM2'ye env var'ı aktar ve yeniden başlat
            export STAGING_BASIC_AUTH="$STAGING_AUTH"
            pm2 reload milletneder-staging --update-env

            # nginx Basic Auth'u devre dışı bırak (Next.js middleware hallediyor artık)
            NGINX_CONF="/etc/nginx/sites-enabled/staging.milletneder.com"
            if grep -q '^\s*auth_basic ' "$NGINX_CONF" 2>/dev/null; then
              echo ">> Disabling nginx auth_basic (handled by Next.js middleware now)..."
              sed -i 's/^\(\s*\)auth_basic /\1#auth_basic /' "$NGINX_CONF"
              sed -i 's/^\(\s*\)auth_basic_user_file /\1#auth_basic_user_file /' "$NGINX_CONF"
              nginx -t && nginx -s reload && echo ">> nginx reloaded successfully" || echo ">> nginx config test FAILED, not reloading"
            else
              echo ">> nginx auth_basic already disabled, skipping"
            fi
